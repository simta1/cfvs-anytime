<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF Contest Finder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Codeforces-Anytime Contest Finder</h1>
        </header>

        <main>
            <section class="card">
                <h2>User Handles</h2>
                <div class="input-group">
                    <input type="text" placeholder="CF Handle..." id="handleInp">
                    <button class="btn-primary" onclick="addHandle()">Add</button>
                </div>

                <div class="table-wrapper">
                    <table id="handleTable">
                        <thead>
                            <tr>
                                <th>Handle</th>
                                <th style="width: 80px">Rating</th>
                                <th style="width: 40px"></th>
                            </tr>
                        </thead>
                        <tbody id="handleBody">
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="card">
                <h2>Available Contests</h2>
                <div class="filter-group">
                    <button class="btn-outline" id="Div. 1" onclick="toggleFilter(this.id)">Div. 1</button>
                    <button class="btn-outline" id="Div. 2" onclick="toggleFilter(this.id)">Div. 2</button>
                    <button class="btn-outline" id="Div. 3" onclick="toggleFilter(this.id)">Div. 3</button>
                    <button class="btn-outline" id="Div. 4" onclick="toggleFilter(this.id)">Div. 4</button>
                    <label
                        style="display: flex; align-items: center; gap: 0.5rem; margin-left: 1rem; font-size: 0.9rem; color: var(--text-muted); cursor: pointer;">
                        <input type="checkbox" id="anytimeFilter"> Anytime Only
                    </label>
                    <button class="btn-primary" style="margin-left: auto;" onclick="showContests()">Find
                        Contests</button>
                </div>

                <div class="table-wrapper">
                    <table id="contestTable">
                        <thead>
                            <tr>
                                <th>Contest Name</th>
                                <th style="width: 100px; text-align: center;"><a
                                        href="https://codeforces-anytime.firebaseapp.com/" target="_blank"
                                        class="header-link">Anytime</a></th>
                            </tr>
                        </thead>
                        <tbody id="contestBody">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="anytime_data.js"></script>
    <script src="scripts.js"></script>
</body>

</html>
